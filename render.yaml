services:
  - type: web
    name: ledgerguard-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements-server.txt
    startCommand: uvicorn src.ledgerguard.api.server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
